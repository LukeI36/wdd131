<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="A Product Review form page that uses and meets the design principles of a form.">
    <meta name="author" content="Luke Ina">

    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Steps to post a Product Review</legend>
                <p><span class="needed">*</span> = required</p>

                <label for="product-name">Product Name<span class="needed">*</span></label>
                <select id="product-name" name="product" required>
                    <option selected disabled value="">Select a Product...&#9662;</option>
                </select>

                <div>Overall Rating<span class="needed">*</span></div>
                <div id="stars" class="star-rating">
                    <input type="radio" id="one-star" name="rating" value="1" required><label for="one-star"></label>
                    <input type="radio" id="two-star" name="rating" value="2" required><label for="two-star"></label>
                    <input type="radio" id="three-star" name="rating" value="3" required><label
                        for="three-star"></label>
                    <input type="radio" id="four-star" name="rating" value="4" required><label for="four-star"></label>
                    <input type="radio" id="five-star" name="rating" value="5" required><label for="five-star"></label>
                </div>

                <label for="date">Date of Installation<span class="needed">*</span></label>
                <input type="date" id="date" name="date" required>

                <div>Which features did you find useful in the product? <span class="italic">(click all that
                        apply)</span>
                </div>
                <label class="checkbox" for="durability"><input type="checkbox" id="durability" name="durability"
                        value="yes">Durability</label>
                <label class="checkbox" for="ease-of-use"><input type="checkbox" id="ease-of-use" name="ease-of-use" value="yes">Ease of
                    Use</label>
                <label class="checkbox" for="performance"><input type="checkbox" id="performance" name="performance"
                        value="yes">Performance</label>
                <label class="checkbox" for="design"><input type="checkbox" id="design" name="design" value="yes">Design</label>

                <label for="written-review">Written Review<span class="optional"> (optional)</span></label>
                <textarea id="written-review" name="written-review" rows="4"></textarea>

                <label for="your-name">Your Name<span class="optional"> (optional)</span></label>
                <input type="text" id="your-name" name="your-name">

                <input type="submit" value="Post Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <p id="copyright">
            ©<span id="currentyear"></span>💻Luke Ina💻British Columbia, Canada
        </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
