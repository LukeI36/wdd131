Responsive image design aims to reduce page weight and deliver optimized images for different screen sizes. Two image formats that are useful to do that are SVG (Scalable Vector Graphics) and WebP formats, which offer better compression for faster page loads.

Webp:
Webp is a modern image format that has better image compression then jpg. Webp allows you to make smaller, richer images that make the webpage faster.

Some new terms you may not know (from lesson):
-Lossless Compression – File compression that maintains the original data using sophisticated algorithms that replace redundancy.
-Lossy Compression – File compression that uses approximations and partial data to represent the original media source.
-Transparency – The image property representing how much of the background color is visible through the image.

WebP is a modern image format that provides superior lossless and lossy compression for images on the web.

Webp lossless images are 26% smaller than size than pngs and 25-34% smaller than jpg.

Webp also supports transparency, at the caveat of the webp size increasing by 22%.

Webp can also be animated.

There is also another file type similar to Webp called AVIF, which offers slightly better compression, but is not quite as well-supported in browsers and does not support progressive rendering.

SVG:
Vector image format; ideal for user interface elements, icons, diagrams, etc., that must be drawn accurately at different sizes.

The Scalable Vector Graphics (SVG) format is a vector image format for two-dimensional graphics with support for interactivity and animation. "As such, it's a text-based, open Web standard for describing images that can be rendered cleanly at any size and are designed specifically to work well with other web standards including CSS, DOM, JavaScript, and SMIL. SVG is, essentially, to graphics what HTML is to text." – MDN

You can open the source code of a SVG file by right clicking it in VSCode and choosing "open with", then choose text editor.
