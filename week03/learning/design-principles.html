Good design principles are essential to form a positive and engaging user experience. Effective web design and art are not the same thing. But many psychological and design principles apply to websites. You can design a great website by applying the relevant aspects of those laws to your layout, typography, and images. Design for the user and your business objectives.

Typography:
You should use at most two to three different fonts. If you need variation, use different font-weights of each font (400px, 700px, 100px, etc.). Choose fonts that are easy to read and make sure when getting fonts from Google Fonts, you only get the font-weights you need.

Color:
Use a color scheme that visually appeals and conveys the mood or message you want to send. Limit your colour palette to five hues or less and test color contrast to ensure readablilty for all users.

Clarity:
Keep the web design clean and uncluttered. Use ample whitespace to guide the user's focus and avoid overwhelming them with too much information. Avoid wordiness and try to instead use visuals to help communicate your message.

Consistency:
Maintain a consistant visual language throughout the whole design. This includes consistant typography, color schemes, and layout patterns across different pages.

Visual Hierarchy:
Establish a hierarchy for the information in the webpage. What is more important in the page? Use size, color, and typography to enphasize more important content.

Accessibility:
Ensure that your website is accessiably to all users, including those with disabilities. This may involve providing alternative text for images, using sufficient color contrast, and implementing keyboard navigation. Test accessibility with tools like WAVE, Axe, or Lighthouse.

Feedback:
Provide clear feedback when the user intracts with an element in the page. This could include visual cues such as button states or animations to indicate that an action has been successfully completed.

User-Centric Design:
Design you website with your target audience's needs and preferences in mind. Conduct user research to understand their goals, behaviors, and pain points, and tailor your design accordingly.

Visual Appeal:
Use visual appealing elements, such as high-quality images, animations, and attractive typography to capture the user's attention to create a more memorable experience.
