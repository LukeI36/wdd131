<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A webpage that gives information on British Columbia, Canada, which is where I live">
    <meta name="author" content="Luke Ina">
    <title>Place</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-larger.css">
    <script src="scripts/place.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>British Columbia, Canada</h1>
    </header>
    <main>
        <picture>
            <source srcset="images/british-columbia-large.webp" media="(min-width: 500px)">
            <img src="images/british-columbia.webp" alt="view of Vancouver, British Columbia" width="1000">
        </picture>
        <div id="data">
            <h2>Data</h2>
            <div>
                <p class="topic">Area:</p>
                <p class="value">944,735 sq km</p>
            </div>
            <div>
                <p class="topic">Population:</p>
                <p class="value">5,683,201</p>
            </div>
            <div>
                <p class="topic">Capital:</p>
                <p class="value">Victoria</p>
            </div>
            <div>
                <p class="topic">Languages:</p>
                <p class="value">English, French</p>
            </div>
            <div>
                <p class="topic">Currency:</p>
                <p class="value">Canadian Dollar (CAD)</p>
            </div>
            <div>
                <p class="topic">Time Zone:</p>
                <p class="value">UTC-8</p>
            </div>
            <div>
                <p class="topic">Calling Code:</p>
                <p class="value">+1</p>
            </div>
            <div>
                <p class="topic">Internet TLD:</p>
                <p class="value">.ca</p>
            </div>
        </div>
        <div id="weather">
            <h2>Weather</h2>
            <img src="images/cloud-sun.svg" alt="weather icon">
        </div>
    </main>
    <footer>
        <p id="copyright">
            ©<span id="currentyear"></span>💻Luke Ina💻British Columbia, Canada
        </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
