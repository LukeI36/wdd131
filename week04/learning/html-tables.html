<!-- 
HTML tables allow you to show information in structure that includes tabular data, meaning that you are able to use rows and columns to organize and show information.

It is important to understand that HTML tables are not meant to be used to structure page layouts, meaning don't use HTML tables just to stylize your webpage. That's what flex and grid are used for.

Some problems that may come when misusing HTML tables:
-The markup becomes bloated, which can cause confusion and make it hard to maintain and debug the page. There are better choices.
-Table layouts reduce accessibility for the visually impaired when used for page layout instead of their intended purpose.
-Tables are not ideal for responsive page behavior.

When using tables, use zebra striping, meaning alternating colors between each row or column. It improve readability. 

Zebra or candy striping is the practice of coloring every other row in a table to improve readability. This is done using the nth-child pseudo-class.
